version: "3.9"

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: winbig-openclaw
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./master-agent-prompt.md:/app/prompt.md:ro
      - openclaw-data:/app/data
    depends_on:
      - redis
    networks:
      - winbig

  redis:
    image: redis:7-alpine
    container_name: winbig-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - winbig

  nginx:
    image: nginx:alpine
    container_name: winbig-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - openclaw
    networks:
      - winbig

volumes:
  openclaw-data:
  redis-data:

networks:
  winbig:
    driver: bridge
